# AWS EC2 Nginx Configuration Draft

server {
    listen 80;
    server_name _; # Your domain or AWS Public IP here

    # 1. Frontend: React Static Files (Served by Nginx)
    location / {
        root /var/www/todo-app/frontend/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Backend: Node.js / Express API (Reverse Proxy)
    location /api/ {
        proxy_pass http://localhost:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
